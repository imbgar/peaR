# OSV-Scanner ignore list — every entry is a transitive advisory that does not
# affect pear, with a reason. pear is a macOS-only Tauri app, so Tauri's Linux GTK
# stack is never compiled; the rest are unmaintained-crate advisories on build-time
# or transitive deps with no fixed version. Reviewed 2026-06-03; revisit when Tauri
# bumps its gtk-rs (glib 0.20+) or the deps below find maintained replacements.

# ── Tauri Linux windowing stack (gtk-rs 0.18) — not compiled on macOS ──────────
[[IgnoredVulns]]
id = "RUSTSEC-2024-0429" # glib < 0.20 unsoundness (Medium); also GHSA-wrw7-89jp-8q8g
reason = "Transitive via tauri -> gtk 0.18 (Linux-only). Not compiled on pear's macOS target; tauri pins gtk ^0.18 so glib can't be bumped to 0.20 here."

