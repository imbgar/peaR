version: 2
updates:
  # Group only minor + patch bumps so they land as one low-risk PR. MAJOR bumps come
  # as individual PRs (ungrouped) — they often carry breaking changes that need a
  # deliberate, separately-validated upgrade rather than riding in with patches.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
