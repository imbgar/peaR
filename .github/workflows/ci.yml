name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core · fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (core)
        run: cargo clippy -p pear-core --all-targets -- -D warnings
      - name: test (core)
        run: cargo test -p pear-core

  app:
    name: app · lint · build · clippy (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: install frontend deps
        run: npm ci
        working-directory: apps/desktop
      - name: lint frontend (eslint)
        run: npm run lint
        working-directory: apps/desktop
      - name: build frontend (tsc + vite)
        run: npm run build
        working-directory: apps/desktop
      - name: clippy (desktop crate)
        run: cargo clippy -p desktop --all-targets -- -D warnings
