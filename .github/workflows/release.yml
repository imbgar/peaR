name: Release

# Tag a release to build and publish the macOS bundle:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build · macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: install frontend deps
        run: npm ci
        working-directory: apps/desktop
      - name: extract release notes from CHANGELOG
        id: notes
        # The GitHub release body MUST be this version's actual CHANGELOG.md section, not a
        # pointer (see CLAUDE.md → Releases). Pull the `## [x.y.z]` block; FAIL the release if
        # it's missing, so a stub body can never ship again.
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '$0 ~ "^## \\[" ver "\\]" {f=1; next} /^## \[/ {f=0} f' CHANGELOG.md > notes.md
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "::error::No CHANGELOG.md section for $ver — refusing to publish a stub release. Add the entry and re-tag."
            exit 1
          fi
          printf '\n---\n_Unsigned build — right-click → **Open** on first launch._\n' >> notes.md
          { echo 'body<<PEAR_NOTES_EOF'; cat notes.md; echo 'PEAR_NOTES_EOF'; } >> "$GITHUB_OUTPUT"
      - name: build & publish (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'peaR ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
