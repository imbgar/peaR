name: Release

# Tag a release to build and publish the macOS bundle:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build · macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: install frontend deps
        run: npm ci
        working-directory: apps/desktop
      - name: build & publish (signed updater artifacts)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these repo secrets to enable in-app auto-update.
          # Without them the build still succeeds; it just won't emit latest.json/.sig,
          # so existing installs won't auto-update (manual download still works).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'peaR ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/imbgar/pear/blob/main/CHANGELOG.md). Unsigned build — right-click → Open on first launch.'
          releaseDraft: false
          prerelease: false
          # Emit latest.json (the updater manifest) alongside the .dmg / .app.tar.gz.
          includeUpdaterJson: true
          args: --target universal-apple-darwin
