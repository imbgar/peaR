name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

# Scans Cargo.lock + package-lock.json against the OSV database and fails the job
# on findings. Runs the scanner directly (no SARIF upload), so it works on private
# repos too — unlike code-scanning uploads which need a public repo or GH Advanced Security.
jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --config=./osv-scanner.toml
            --lockfile=./Cargo.lock
            --lockfile=./apps/desktop/package-lock.json
