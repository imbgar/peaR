name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

# Scans Cargo.lock + package-lock.json against the OSV database, fails on findings,
# and uploads results to the Security tab (code scanning). Advisories listed in
# osv-scanner.toml are filtered out *before* SARIF, so they neither fail the gate nor
# appear as alerts — see that file for per-advisory reasons.
jobs:
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --lockfile=./Cargo.lock
        --lockfile=./apps/desktop/package-lock.json
