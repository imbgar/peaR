name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

# Scans Cargo.lock + package-lock.json against the OSV vulnerability database
# and uploads results to the Security tab.
jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.0.2
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=./Cargo.lock
        --lockfile=./apps/desktop/package-lock.json
