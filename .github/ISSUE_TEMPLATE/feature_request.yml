name: ✨ Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that pear makes hard today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap
      options:
        - label: I checked docs/ROADMAP.md and this isn't already planned
