name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PR owner/repo#123
        2. Click Standard
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pear version / commit
      placeholder: v0.1.0 or commit sha
    validations:
      required: true
  - type: dropdown
    id: cli
    attributes:
      label: CLI in the tab
      options: [claude, codex, aider, shell, n/a]
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: macOS version, chip (Apple Silicon/Intel), Rust/Node versions
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / status-bar messages
      render: shell
